---
# Drops, recreates, and reloads each database that has an 's3_restore' block.
# Runs only when mysql_restore_from_s3 is true.

- name: "Ensure staging directory exists"
  file:
    path: "{{ mysql_s3_staging_dir }}"
    state: directory
    mode: "0700"
  tags:
    - restore

- name: "Install unzip and curl (Ubuntu)"
  apt:
    name:
      - unzip
      - curl
    state: present
  when: ansible_distribution == "Ubuntu"
  tags:
    - restore

- name: "Install unzip and curl (Alpine)"
  community.general.apk:
    name:
      - unzip
      - curl
    state: present
  when: ansible_distribution == "Alpine"
  tags:
    - restore

- name: "Check if AWS CLI v2 is already installed"
  command: aws --version
  register: aws_cli_check
  failed_when: false
  changed_when: false
  tags:
    - restore

- name: "Download AWS CLI v2 installer (x86_64)"
  get_url:
    url: "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip"
    dest: "/tmp/awscliv2.zip"
    mode: "0644"
  when:
    - aws_cli_check.rc != 0
    - ansible_architecture == "x86_64"
  tags:
    - restore

- name: "Download AWS CLI v2 installer (aarch64)"
  get_url:
    url: "https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip"
    dest: "/tmp/awscliv2.zip"
    mode: "0644"
  when:
    - aws_cli_check.rc != 0
    - ansible_architecture == "aarch64"
  tags:
    - restore

- name: "Extract AWS CLI v2 installer"
  unarchive:
    src: "/tmp/awscliv2.zip"
    dest: "/tmp"
    remote_src: true
  when: aws_cli_check.rc != 0
  tags:
    - restore

- name: "Install AWS CLI v2"
  command: /tmp/aws/install
  when: aws_cli_check.rc != 0
  tags:
    - restore

- name: "Clean up AWS CLI installer files"
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/tmp/awscliv2.zip"
    - "/tmp/aws"
  when: aws_cli_check.rc != 0
  tags:
    - restore

- name: "Drop database before restore"
  mysql_db:
    name: "{{ item.name }}"
    state: absent
    login_host: "{{ item.login_host }}"
  loop: "{{ mysql_databases }}"
  when: item.s3_restore is defined
  tags:
    - restore

- name: "Recreate database after drop"
  mysql_db:
    name: "{{ item.name }}"
    collation: "{{ item.collation | default('utf8mb4_0900_ai_ci') }}"
    encoding: "{{ item.encoding | default('utf8mb4') }}"
    state: present
    login_host: "{{ item.login_host }}"
  loop: "{{ mysql_databases }}"
  when: item.s3_restore is defined
  tags:
    - restore

- name: "Fetch SQL dump from S3"
  amazon.aws.aws_s3:
    bucket: "{{ item.s3_restore.bucket }}"
    object: "{{ item.s3_restore.key }}"
    dest: "{{ mysql_s3_staging_dir }}/{{ item.name }}.sql"
    mode: get
    aws_access_key: "{{ mysql_s3_aws_access_key | default(omit) }}"
    aws_secret_key: "{{ mysql_s3_aws_secret_key | default(omit) }}"
    region: "{{ mysql_s3_aws_region }}"
  loop: "{{ mysql_databases }}"
  when: item.s3_restore is defined
  tags:
    - restore

- name: "Load SQL dump into database"
  mysql_db:
    name: "{{ item.name }}"
    state: import
    target: "{{ mysql_s3_staging_dir }}/{{ item.name }}.sql"
    login_host: "{{ item.login_host }}"
  loop: "{{ mysql_databases }}"
  when: item.s3_restore is defined
  tags:
    - restore

- name: "Remove staged dump files"
  file:
    path: "{{ mysql_s3_staging_dir }}/{{ item.name }}.sql"
    state: absent
  loop: "{{ mysql_databases }}"
  when: item.s3_restore is defined
  tags:
    - restore
